name: Build iOS IPA

on:
  push:
    branches: [master, feature/on-device-speech]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write .env
        run: |
          echo "EXPO_PUBLIC_BUILD_NUMBER=${{ github.run_number }}" > .env

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build ad-hoc signed xcarchive
        run: |
          cd ios
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE  Scheme: $SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/VoiceMemos.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_BITCODE=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Package as IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/VoiceMemos.xcarchive/Products" -name "*.app" | head -1)
          echo "App path: $APP_PATH"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r VoiceMemos.ipa Payload
          echo "IPA size: $(du -sh VoiceMemos.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMemos-iOS
          path: ${{ runner.temp }}/ipa/VoiceMemos.ipa
          retention-days: 30
