name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write .env
        run: echo "EXPO_PUBLIC_GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned xcarchive
        run: |
          cd ios
          xcodebuild archive \
            -workspace "VoiceMemos.xcworkspace" \
            -scheme "VoiceMemos" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/VoiceMemos.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE="" \
            | xcpretty || true

      - name: Package as unsigned IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/VoiceMemos.xcarchive/Products" -name "*.app" | head -1)
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r VoiceMemos.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMemos-iOS
          path: ${{ runner.temp }}/ipa/VoiceMemos.ipa
          retention-days: 30
